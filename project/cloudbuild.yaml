steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/rebel-visualizer:$BUILD_ID', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rebel-visualizer:$BUILD_ID']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'rebel-visualizer'
    - '--image=gcr.io/$PROJECT_ID/rebel-visualizer:$BUILD_ID'
    - '--region=us-central1'
    - '--platform=managed'
    - '--allow-unauthenticated'
    - '--port=8080'
    - '--memory=512Mi'
    - '--cpu=1'
    - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID'
    - '--set-secrets=GOOGLE_SHEET_ID=google-sheet-id:latest,GCP_SECRET_NAME=google-sheets-credentials:latest'

images:
- 'gcr.io/$PROJECT_ID/rebel-visualizer:$BUILD_ID' 